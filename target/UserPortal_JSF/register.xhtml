<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">

<h:head>
    <title>Employee Registration</title>

    <style>

body{
    margin:0;
    background:#d4d0c8;
    font-family:Tahoma,Arial,sans-serif;
    font-size:11px;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.window{
    width:500px;
    background:#d4d0c8;
    border-top:2px solid white;
    border-left:2px solid white;
    border-right:2px solid #404040;
    border-bottom:2px solid #404040;
    box-shadow:7px 7px rgba(0,0,0,.35);
}

.titlebar{
    height:28px;
    background:linear-gradient(#3f7bd6,#0a246a);
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 8px;
    font-weight:bold;
}

.close{
    width:18px;
    height:18px;
    background:#d4d0c8;
    border-top:1px solid white;
    border-left:1px solid white;
    border-right:1px solid #404040;
    border-bottom:1px solid #404040;
    text-align:center;
    line-height:18px;
    font-weight:bold;
}

.content{
    padding:20px;
}

.avatar{
    width:72px;
    height:72px;
    border-radius:50%;
    background:white;
    border:2px solid gray;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:34px;
    margin-bottom:18px;
}

label{
    display:block;
    margin-top:10px;
    margin-bottom:4px;
    font-weight:bold;
}

.input{
    width:100%;
    height:26px;
    box-sizing:border-box;
    padding-left:6px;
    font-family:Tahoma;
    border-top:2px solid #7f9db9;
    border-left:2px solid #7f9db9;
    border-right:1px solid white;
    border-bottom:1px solid white;
}

.button{
    width:170px;
    height:32px;
    margin-top:20px;
    background:linear-gradient(#ffffff,#d4d0c8);
    border-top:1px solid white;
    border-left:1px solid white;
    border-right:1px solid #404040;
    border-bottom:1px solid #404040;
    cursor:pointer;
    font-family:Tahoma;
}

.button:hover{
    background:linear-gradient(#fff4b1,#ffd96b);
}

.footer{
    text-align:center;
    margin-top:20px;
}

.message{
    color:red;
    font-size:10px;
}

    </style>

</h:head>

<h:body>

<h:form enctype="multipart/form-data">

<div class="window">

<div class="titlebar">

<span>🪪 Employee Registration</span>

<div class="close">X</div>

</div>

<div class="content">

<div class="avatar">👤</div>

<label>Full Name</label>

<h:inputText
styleClass="input"
value="#{registerBean.fullName}"
required="true"/>

<h:message for="name" styleClass="message"/>

<label>Email Address</label>

<h:inputText
styleClass="input"
value="#{registerBean.email}"
required="true"/>

<label>Employee ID</label>

<h:inputText
styleClass="input"
value="#{registerBean.employeeId}"
required="true"/>

<label>Create Password</label>

<h:inputSecret
styleClass="input"
value="#{registerBean.password}"
required="true"/>

<label>Confirm Password</label>

<h:inputSecret
styleClass="input"
value="#{registerBean.confirmPassword}"
required="true"/>

<label>Upload Employee ID Card</label>

<h:inputFile
styleClass="input"
value="#{registerBean.idProof}"/>

<div style="text-align:center;">

<h:commandButton
value="Create Account"
styleClass="button"
action="#{registerBean.register}"/>

</div>

<div class="footer">

Already have an account?

<br/><br/>

<h:link
    outcome="login"
    value="Back to Sign In"/>

</div>

</div>

</div>

</h:form>

</h:body>

</html>
