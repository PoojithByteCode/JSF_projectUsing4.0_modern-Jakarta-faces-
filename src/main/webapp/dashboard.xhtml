<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
      <f:metadata>
    <f:viewAction action="#{loginBean.checkSession}" />
</f:metadata>
<h:head>
    <title>Employee Dashboard</title>

    <style>

body{
    margin:0;
    background:#d4d0c8;
    font-family:Tahoma,Arial,sans-serif;
    font-size:11px;
}

/* Window */

.window{
    width:98%;
    margin:10px auto;
    background:#d4d0c8;
    border-top:2px solid white;
    border-left:2px solid white;
    border-right:2px solid #404040;
    border-bottom:2px solid #404040;
    box-shadow:7px 7px rgba(0,0,0,.35);
}

/* Title Bar */

.titlebar{
    height:32px;
    background:linear-gradient(#3f7bd6,#0a246a);
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 10px;
    font-weight:bold;
}

.controls{
    display:flex;
    gap:4px;
}

.ctrl{
    width:18px;
    height:18px;
    background:#d4d0c8;
    border-top:1px solid white;
    border-left:1px solid white;
    border-right:1px solid #404040;
    border-bottom:1px solid #404040;
    text-align:center;
    line-height:18px;
    cursor:pointer;
}

/* Menu */

.menu{
    height:28px;
    background:#ece9d8;
    border-bottom:1px solid gray;
    display:flex;
    align-items:center;
    gap:25px;
    padding-left:15px;
    font-weight:bold;
}

.menu span:hover{
    color:blue;
    cursor:pointer;
}

/* Layout */

.wrapper{
    display:flex;
}

/* Sidebar */

.sidebar{
    width:220px;
    background:#ece9d8;
    border-right:1px solid gray;
    min-height:700px;
}

.profile{
    text-align:center;
    padding:20px;
}

.avatar{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    background:white;
    border:2px solid gray;
    font-size:40px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.name{
    margin-top:12px;
    font-weight:bold;
    font-size:13px;
}

.id{
    color:#555;
    margin-top:4px;
}

.nav{
    margin-top:20px;
}

.nav a{
    display:block;
    padding:12px;
    color:black;
    text-decoration:none;
    border-top:1px solid white;
    border-bottom:1px solid gray;
}

.nav a:hover{
    background:#316ac5;
    color:white;
}

/* Content */

.content{
    flex:1;
    padding:20px;
}

.section-title{
    font-size:18px;
    font-weight:bold;
    color:#003399;
    margin-bottom:20px;
}

/* Cards */

.row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.card{
    flex:1;
    background:#ece9d8;
    border-top:2px solid white;
    border-left:2px solid white;
    border-right:2px solid #404040;
    border-bottom:2px solid #404040;
    padding:15px;
}

.card h3{
    margin-top:0;
    color:#003399;
    border-bottom:1px solid gray;
    padding-bottom:8px;
}

.info{
    margin:8px 0;
}

.label{
    font-weight:bold;
}

.progress{
    width:100%;
    height:18px;
    background:white;
    border:1px solid gray;
}

.bar{
    height:18px;
    background:#3f7bd6;
}

/* Footer */

.footer{
    text-align:center;
    padding:12px;
    background:#ece9d8;
    border-top:1px solid gray;
}

    </style>

</h:head>

<h:body>

<div class="window">

<div class="titlebar">

<span>🖥 Employee Management System - Dashboard</span>

<div class="controls">
<div class="ctrl">_</div>
<div class="ctrl">□</div>
<div class="ctrl">X</div>
</div>

</div>

<div class="menu">
<span>File</span>
<span>Edit</span>
<span>View</span>
<span>Employee</span>
<span>Reports</span>
<span>Help</span>
</div>

<div class="wrapper">

<div class="sidebar">

<div class="profile">

<div class="avatar">👤</div>

<div class="name">
#{loginBean.loggedInUser.fullName}
</div>

<div class="id">
#{loginBean.loggedInUser.employeeId}
</div>

</div>

<div class="nav">

<h:link outcome="dashboard" value="🏠 Dashboard"/>

<h:link outcome="profile" value="👤 My Profile"/>

<h:link outcome="attendance" value="📅 Attendance"/>

<h:link outcome="projects" value="💼 Projects"/>

<h:link outcome="settings" value="⚙ Settings"/>


<h:form>


<h:commandLink value="🚪 Logout"
          action="#{loginBean.logout()}"/>
          
          
</h:form>



</div>

</div>

<div class="content">

<div class="section-title">
Welcome, #{loginBean.loggedInUser.fullName}
</div>

<!-- PART 2 STARTS HERE -->

</div>

</div>

<div class="footer">

Employee Portal • JSF 4.0 • Java 17 • MySQL

</div>

</div>

</h:body>

</html>
